<section aria-labelledby="portfolio-title" class="mb-5 pt-md-5" id="portfolio">
  <header>
    <h2
      id="portfolio-title"
      class="text-center text-primary py-4 mb-md-3 mb-0 pt-md-0 lead display-5"
    >
      {{ titleLabel() }}
    </h2>
  </header>

  @if (projectList().length) {
    <app-project-gallery [projectList]="projectList()"></app-project-gallery>
  } @else {
    <p class="text-center text-secondary py-3">{{ emptyMessage() }}</p>
  }
</section>
