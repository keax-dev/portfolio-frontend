<section aria-labelledby="education-title" class="container pt-0 pt-md-5" id="education">
  <div class="row">
    <header class="col-md-3 col-12 position-relative">
      <h2
        id="education-title"
        class="text-center text-primary py-4 mt-0 mt-md-5 pt-md-5 lead display-5 sticky-top"
      >
        {{ titleLabel() }}
      </h2>
    </header>

    <div class="col-md-9 col-12 py-4 shadow-lg bg-white card">
      @if (educationList().length === 0) {
        <p class="text-center text-secondary">{{ emptyMessage() }}</p>
      } @else {
        <ol class="list-unstyled m-0 p-0">
          @for (education of educationList(); track education.id) {
            <li>
              <app-card-education
                [education]="education"
                [position]="$index % 2 !== 0"
              ></app-card-education>
            </li>
          }
        </ol>
      }
    </div>
  </div>
</section>
