<header class="position-relative text-center text-white" id="home">
  <video autoPlay muted loop class="header-video-bg position-absolute top-0 end-0 w-100 h-100 opacity">
    <source src="/background/bg-header.mp4" />
    Your browser does not support HTML5 video.
  </video>

  <div class="header-content position-relative py-4">
    <div class="container">
      <img
        [src]="profile.image"
        [attr.alt]="'Foto de ' + profile.name"
        class="img-fluid rounded-circle border border-primary border-2 mb-3"
      />
    </div>

    <div class="container d-flex justify-content-center flex-column">
      <h1 class="border-bottom border-primary border-2 pb-2">
        <span class="machine-1"
          >{{ profile.name }} {{ profile.last_name }}</span
        >
      </h1>
      <h3 class="my-2">
        <span class="machine-2">{{ profile.title }}</span>
      </h3>
    </div>

    <div class="container mt-3">
      <a
        [href]="profile.cv"
        [attr.aria-label]="aria_label + profile.name"
        class="btn btn-cv btn-primary position-relative overflow-hidden px-4 py-1"
        target="_blank"
      >
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        Visualizar CV
      </a>
    </div>
  </div>
</header>
