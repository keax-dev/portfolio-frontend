<article class="row m-3">
  <div class="col-12 col-md-6" [ngClass]="{ 'offset-md-6': position }">
    <div class="card pointer border-primary shadow-lg px-3 py-2">
      <div class="row align-items-center">
        <div class="col-3">
          <img
            [src]="education.institution_url"
            [alt]="education.institution_name"
            class="w-100"
          />
        </div>
        <div class="col-9">
          <p class="card-text mb-1 text-muted">
            {{ education.place | titlecase }}, {{ education | language : "end" : translate.getLang | titlecase }}
          </p>
          <h6 class="card-title mb-1 fw-bold text-dark">
            {{ education | language : "institution_name" : translate.getLang | titlecase }}
          </h6>
          <p class="card-text mb-0 text-secondary">
            {{ education | language : "title" : translate.getLang | titlecase }}
          </p>
        </div>
      </div>
    </div>
  </div>
</article>
