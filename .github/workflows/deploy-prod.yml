# Pipeline de publicacion de la imagen Docker de produccion.
# Solo se ejecuta cuando el workflow de CI termina correctamente sobre main.
name: Deploy Prod

on:
  workflow_run:
    # Escucha el resultado del workflow de integracion continua.
    workflows: ['CI']
    types:
      - completed
    branches:
      - main

# Permisos necesarios:
# - contents: leer el repositorio
# - packages: publicar la imagen en GitHub Container Registry
permissions:
  contents: read
  packages: write

# Evita publicaciones paralelas de produccion.
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  publish-image:
    # Solo continua si el CI termino exitosamente.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    # Cancela el job si la construccion/publicacion se queda colgada.
    timeout-minutes: 10
    outputs:
      # Nombre base del repositorio de imagen en GHCR.
      image_name: ${{ steps.image.outputs.name }}
      # Referencia exacta de la imagen que luego se desplegara en produccion.
      # Usa el SHA del commit para que el despliegue sea trazable e inmutable.
      image_ref: ${{ steps.image.outputs.name }}:sha-${{ github.event.workflow_run.head_sha }}

    steps:
      # Descarga el codigo exacto del commit que aprobo el CI.
      - name: Descargar el codigo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Prepara el builder moderno de Docker para construir imagenes.
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Normaliza el nombre de la imagen a minusculas porque GHCR lo requiere.
      - name: Normalizar nombre de imagen
        id: image
        shell: bash
        run: echo "name=$(echo 'ghcr.io/${{ github.repository_owner }}/portfolio-frontend' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Inicia sesion en GHCR usando el token automatico de GitHub Actions.
      - name: Iniciar sesion en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genera tags y labels estandar para la imagen.
      # - latest: ultima version aprobada en main
      # - sha-<commit>: version inmutable para despliegue exacto y rollback
      - name: Generar metadata de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.event.workflow_run.head_sha }}

      # Construye la imagen con el Dockerfile del proyecto y la publica en GHCR.
      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-lightsail:
    # Este job corre en el self-hosted runner del propio Lightsail.
    # Por eso ya no necesita SSH: actualiza el despliegue localmente
    # y evita abrir el puerto 22 a internet para el pipeline.
    needs: publish-image
    runs-on: [self-hosted, Linux, X64, production]
    environment: production
    # Cancela el deploy si algo se cuelga mas de 10 minutos.
    timeout-minutes: 10

    steps:
      # Descarga el codigo del mismo commit para obtener el compose de produccion.
      - name: Descargar el codigo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Crea la carpeta de despliegue local si no existe aun.
      - name: Preparar carpeta de despliegue
        shell: bash
        env:
          LIGHTSAIL_FRONTEND_PATH: ${{ secrets.LIGHTSAIL_FRONTEND_PATH }}
        run: |
          mkdir -p "$LIGHTSAIL_FRONTEND_PATH"

      # Copia el compose de produccion a la carpeta local del despliegue.
      - name: Copiar compose de produccion
        shell: bash
        env:
          LIGHTSAIL_FRONTEND_PATH: ${{ secrets.LIGHTSAIL_FRONTEND_PATH }}
        run: |
          cp ./docker-compose.prod.yml "$LIGHTSAIL_FRONTEND_PATH/docker-compose.prod.yml"

      # Inicia sesion en GHCR, actualiza la imagen y recrea el contenedor local.
      - name: Actualizar contenedor en Lightsail
        shell: bash
        env:
          LIGHTSAIL_FRONTEND_PATH: ${{ secrets.LIGHTSAIL_FRONTEND_PATH }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          FRONTEND_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
        run: |
          set -euo pipefail
          # Guarda en .env.prod la imagen exacta que debe ejecutar produccion.
          mkdir -p "$LIGHTSAIL_FRONTEND_PATH"
          printf 'FRONTEND_IMAGE=%s\n' "$FRONTEND_IMAGE" > "$LIGHTSAIL_FRONTEND_PATH/.env.prod"
          # Autentica Docker contra GHCR para poder descargar la imagen publicada.
          printf '%s' "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          # Descarga la imagen objetivo y recrea el contenedor con esa version exacta.
          cd "$LIGHTSAIL_FRONTEND_PATH"
          docker compose --env-file .env.prod -f docker-compose.prod.yml pull frontend
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
          # Limpia imagenes sin uso para no crecer innecesariamente en disco.
          docker image prune -f

      # Smoke check posterior al deploy.
      # Si el contenedor no responde HTTP, el workflow falla aunque docker compose haya terminado.
      - name: Verificar frontend desplegado
        shell: bash
        run: |
          curl --fail --silent --show-error http://127.0.0.1:4201 > /dev/null
