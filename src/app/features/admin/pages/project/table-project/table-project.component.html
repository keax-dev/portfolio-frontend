<section class="container-fluid p-4">
  <app-page-header [title]="pageCopy.title" [subtitle]="pageCopy.subtitle"></app-page-header>

  <app-tabla
    (itemDelete)="confirmDelete($event)"
    (itemEdit)="modalProject($event)"
    (itemNew)="modalProject()"
    [records]="records()"
    [columns]="columns"
    [newTxt]="pageCopy.entity"
    [loading]="isLoading()"
    [errorMessage]="loadErrorMessage()"
  ></app-tabla>
</section>
