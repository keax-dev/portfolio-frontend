<div [id]="carouselId" class="carousel slide">
  <div class="carousel-inner">
    @for (project of projectList(); track $index) {
      <div class="carousel-item" [class.active]="$index === 0">
        <div class="d-flex justify-content-center align-items-center flex-column">
          <h3 class="text-primary fw-bold my-3">
            {{ project | language: 'title' : translate.getLang }}
          </h3>

          <button
            [attr.aria-label]="'Open image of ' + project.title"
            (click)="showImage(project)"
            class="p-0 border-0 bg-transparent"
            type="button"
          >
            <img [src]="project.picture" [alt]="project.title" class="img-project img-hover" />
          </button>

          <div class="my-4">
            @if (project.deploy) {
              <a
                [attr.aria-label]="'Open deployment for ' + project.title"
                [href]="project.deploy"
                target="_blank"
                class="btn btn-secondary m-1"
                title="Open deployment"
                rel="noopener noreferrer"
              >
                <i class="pi pi-external-link" aria-hidden="true"></i>
              </a>
            }

            @if (project.github) {
              <a
                [attr.aria-label]="'Open GitHub repository for ' + project.title"
                [href]="project.github"
                target="_blank"
                class="btn btn-dark m-1"
                title="GitHub"
                rel="noopener noreferrer"
              >
                <i class="pi pi-github" aria-hidden="true"></i>
              </a>
            }

            <button
              [attr.aria-label]="'View details of ' + project.title"
              (click)="showProjectDetails(project)"
              class="btn btn-primary m-1"
              title="View details"
              type="button"
            >
              <i class="pi pi-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>
    }
  </div>

  <button
    [attr.data-bs-target]="'#' + carouselId"
    data-bs-slide="prev"
    class="carousel-control-prev bg-primary"
    type="button"
  >
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>

  <button
    [attr.data-bs-target]="'#' + carouselId"
    data-bs-slide="next"
    class="carousel-control-next bg-primary"
    type="button"
  >
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
