<article class="row m-3">
  <div [ngClass]="{ 'offset-md-6': position() }" class="col-12 col-md-6">
    <div class="card pointer border-primary shadow-lg px-3 py-2">
      <div class="row align-items-center">
        <div class="col-3">
          <img
            [src]="education().institution_url"
            decoding="async"
            loading="lazy"
            class="w-100"
            alt=""
          />
        </div>
        <div class="col-9">
          <p class="card-text mb-1 text-muted">
            {{ education().place | titlecase }},
            {{ education() | language: 'end' : translate.getLang | titlecase }}
          </p>
          <h3 class="card-title h6 mb-1 fw-bold text-dark">
            {{ education() | language: 'institution_name' : translate.getLang | titlecase }}
          </h3>
          <p class="card-text mb-0 text-secondary">
            {{ education() | language: 'title' : translate.getLang | titlecase }}
          </p>
        </div>
      </div>
    </div>
  </div>
</article>
