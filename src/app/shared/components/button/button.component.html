<button
  (click)="clickAction()"
  [attr.aria-disabled]="isDisabled()"
  [attr.aria-label]="buttonAriaLabel()"
  [attr.aria-busy]="loading()"
  [disabled]="isDisabled()"
  [class]="buttonClass()"
  [type]="buttonType()"
>
  @if (buttonIcon()) {
    <i [class]="buttonIcon()" aria-hidden="true"></i>
  }
  {{ buttonText() }}
</button>
