<article class="container-fluid p-4 position-relative">
  <button
    (click)="close()"
    [attr.aria-label]="translate.text(text.portfolio.project.closeDetails)"
    [title]="translate.text(text.portfolio.project.closeDetails)"
    class="btn btn-close position-absolute top-0 end-0 m-2"
    type="button"
  ></button>

  <header class="text-center mb-3">
    <h2 class="text-primary fw-bolder">
      {{ project | language: 'title' : translate.getLang }}
    </h2>

    <div
      class="d-flex flex-wrap justify-content-center gap-2 mt-3"
      [attr.aria-label]="translate.text(text.portfolio.project.technologies)"
    >
      @for (technology of project.technologies; track technology.id) {
        <span class="badge rounded-pill text-bg-light border text-secondary">
          {{ technology.name }}
        </span>
      }
    </div>
  </header>

  <hr />
  <p>{{ project | language: 'description' : translate.getLang }}</p>
  <hr />

  <figure class="d-flex justify-content-center align-items-center">
    <button
      (click)="showImage()"
      [attr.aria-label]="
        translate.text(text.portfolio.project.openImage) +
        ' ' +
        (project | language: 'title' : translate.getLang)
      "
      class="p-0 border-0 bg-transparent"
      type="button"
    >
      <img
        [src]="project.picture"
        [alt]="project | language: 'title' : translate.getLang"
        decoding="async"
        loading="lazy"
        class="w-75 img-hover"
      />
    </button>

    <figcaption class="visually-hidden">
      {{ project | language: 'title' : translate.getLang }}
    </figcaption>
  </figure>

  <hr />

  <footer class="row">
    <div class="col-12 text-center">
      @for (link of project.links; track link.id ?? link.type) {
        <a
          [href]="link.url"
          [attr.aria-label]="projectLinkLabel(link)"
          target="_blank"
          class="btn btn-outline-secondary m-1"
          rel="noopener noreferrer"
        >
          <i [class]="linkIcon(link)" aria-hidden="true"></i>
          {{ linkLabel(link) }}
        </a>
      }
    </div>
  </footer>
</article>
